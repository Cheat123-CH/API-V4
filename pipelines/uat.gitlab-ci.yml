deploy:
  stage: deploy:uat
  variables:
    PROJECT_NAME: POS
    SERVICE_TYPE: web
    SERVICE_NAMESPACE: ${PROJECT_NAME}/${SERVICE_TYPE}
    ENABLED_BUILD: "true"
    IP_ADDRESS: "109.123.234.231"
  environment:
    name: "CamCyber/${PROJECT_NAME}/Development"
  only:
    # - /^v-.*-release$/
    - uat
  before_script:
    - source "${TEST_ENVIRONMENT}"
  script:
    - echo $CI_COMMIT_REF_NAME
    - bash -e scripts/deploy.sh
